name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Fly.io configuration
        id: fly_config
        run: |
          app_name="${{ vars.FLY_APP_NAME }}"

          if [[ -z "$app_name" ]]; then
            app_name="${{ secrets.FLY_APP_NAME }}"
          fi

          if [[ -z "${{ secrets.FLY_API_TOKEN }}" || -z "$app_name" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Fly.io deploy skipped: configure secret FLY_API_TOKEN and set FLY_APP_NAME (variable or secret)."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "app_name=$app_name" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Flyctl
        if: steps.fly_config.outputs.enabled == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy to Fly.io
        if: steps.fly_config.outputs.enabled == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --app "${{ steps.fly_config.outputs.app_name }}"

      - name: Skip deploy (configuration pending)
        if: steps.fly_config.outputs.enabled != 'true'
        run: echo "CD workflow is ready. Add Fly.io settings to enable deployment."
