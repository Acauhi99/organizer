app = "organizer"
primary_region = "gru"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  PHX_HOST = "organizer.fly.dev"
  PHX_SERVER = "true"
  PORT = "4000"
  DATABASE_PATH = "/data/organizer.db"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "organizer_data"
  destination = "/data"
